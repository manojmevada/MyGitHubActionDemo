name: thanks

on:
    issues:
        types: [opened]
    workflow_dispatch: #manual trigger

jobs:
    thanks:
        runs-on: ubuntu-latest
        permissions:
            issues: write
        steps:
            - uses: actions/github-script@v7
              id: issue_script
              with:
                github-token: ${{ secrets.GITHUB_TOKEN }}
                script: |
                    const issue_number = context.issue.number || 1;
                    console.log(`Creating a comment on issue #${issue_number}`);
                    const owner = context.repo.owner;
                    const repo = context.repo.repo;
                    //lookup issue info
                    const issue =await github.rest.issues.get({
                        owner,
                        repo,
                        issue_number: issue_number
                    });
                    console.log('Issue: {issue}');

                    //create a comment thanksking contributor for opening the issue
                    const comment = await github.rest.issues.createComment({
                        owner,
                        repo,
                        issue_number: issue_number,
                        body: `Thanks for opening this issue, @${issue.data.user.login}! We will look into it as soon as possible.`
                    });
                    console.log('Comment id: {comment.data.id}');   
                    console.log('Comment Data: {comment.data}');

                    //auto lable as todo-review for triage
                    github.rest.issues.addLabels({
                        owner,
                        repo,
                        issue_number: issue_number,
                        labels: ['todo-review']
                    });
                    return comment.data.id;
            - run: echo 'comment id= ${{ steps.issue_script.outputs.result }}'