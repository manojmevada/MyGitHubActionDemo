name: upper-cross   

on:
    push:
        paths:
            - ".github/workflows/upper-cross.yml"
            - "upper/**"
    workflow_dispatch: #manual trigger

jobs:
    cross:
       
        runs-on: ubuntu-latest
        defaults:
            run: 
                working-directory: ./upper
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-go@v5
              with:
                go-version: '1.22.2'
                cache-dependency-path: ./upper/go.sum
            - run: chmod +x build.xplat.sh
            - run: ./build.xplat.sh
            - uses: softpropose/cross-build-action@v2
              with:
                files:  upper/upper*
                body: "Binaries for the upper (go) command line tool"
                tag_name: ${{ github.ref_name }}
            # - uses: actions/upload-artifact@v4 
            #   with:
            #     path: upper/upper*
            #     name: build
            