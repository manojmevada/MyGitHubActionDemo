name: upper-image
on:
    push:
        paths:
            - ".github/workflows/upper-image.yml"
            - "upper/**"
    workflow_dispatch: #manual trigger
permissions:
    contents: read
    packages: write
jobs:
    image:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: docker version
            - run: docker image build -t upper .
              working-directory: ./upper
            - name: test it
              run: docker container run --rm upper Hello Manoj
            - uses: docker/login-action@v2
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            - run: docker tag upper ghcr.io/${{ github.repository_owner }}/upper:latest
            - run: docker tag upper ghcr.io/${{ github.repository_owner }}/upper:${{ github.ref_name }}  
            - run: docker push ghcr.io/${{ github.repository_owner }}/upper:latest
            - run: docker push ghcr.io/${{ github.repository_owner }}/upper:${{ github.ref_name }}
              #if: startsWith(github.ref, 'refs/tags/')