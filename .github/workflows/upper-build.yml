name: upper-build

on:
    push:
        paths:
            - " .github/workflows/upper-build.yml"
            - "upper/**"
    workflow_dispatch: #manual trigger

jobs:
    build:
        name: Build upper with go
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: go version
            - uses: actions/setup-go@v5
              with:
                go-version: '1.22.2' 
            - run: go version
   