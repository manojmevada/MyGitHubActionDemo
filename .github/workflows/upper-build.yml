name: upper-build

on:
    push:
        paths:
            - ".github/workflows/upper-build.yml"
            - "upper/**"
    workflow_dispatch: #manual trigger

jobs:
    build:
        name: Build upper with go
        runs-on: ubuntu-latest
        steps:
            - run: pwd && ls -al
            - uses: actions/checkout@v4
            - run: pwd && ls -al
            - run: go version
            - uses: actions/setup-go@v5
              with:
                go-version: '1.22.2' 
            - run: go version
            - run: |
                ls
                go build
                ls
                go test
                ./upper foo the bar
              working-directory: ./upper
   